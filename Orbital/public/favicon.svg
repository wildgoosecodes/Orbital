<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="planetGradient" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="45%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="50" rx="40" ry="18" transform="rotate(-18 50 50)"
    fill="none" stroke="#818cf8" stroke-opacity="0.35" stroke-width="1.5" />

  <circle cx="12.4" cy="55.8" r="5" fill="#47bfff" />
  <circle cx="75.6" cy="29.5" r="4.2" fill="#863bff" />
  <circle cx="68.2" cy="61.9" r="3.6" fill="#10b981" />

  <circle cx="50" cy="50" r="17" fill="url(#planetGradient)" filter="url(#glow)" />
</svg>
